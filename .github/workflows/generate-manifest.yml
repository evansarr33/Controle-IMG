name: Générer le manifeste d'images Cloudinary

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-manifest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: photo-review-site
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm install

      - name: Générer data/images.json depuis Cloudinary
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: node scripts/generate-manifest.js

      - name: Commit et push du manifeste
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/images.json
          git diff --staged --quiet && echo "Aucun changement" || git commit -m "Mise à jour du manifeste d'images"
          git push
